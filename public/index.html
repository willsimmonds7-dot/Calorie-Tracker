<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-180.png" />
  <title>CalorieSnap</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>📸 CalorieSnap</h1>
    <p class="sub">Snap your meal, log the macros.</p>
  </header>

  <section class="card today" id="today">
    <div class="today-row">
      <div class="today-cal"><span id="t-cal">0</span><small>kcal eaten today</small></div>
      <div class="today-macros">
        <span>P <b id="t-p">0</b>g</span>
        <span>C <b id="t-c">0</b>g</span>
        <span>F <b id="t-f">0</b>g</span>
        <span><b id="t-meals">0</b> meals</span>
      </div>
    </div>
    <div class="today-energy" id="today-energy">
      <div class="te-cell"><small>Burned</small><b id="t-burned">–</b></div>
      <div class="te-cell"><small>Net</small><b id="t-net">–</b></div>
      <div class="te-state" id="t-state"></div>
    </div>
    <div class="today-goal" id="t-goal"></div>
  </section>

  <!-- no capture attribute => iOS offers both Take Photo and Photo Library -->
  <label class="snap-btn" id="snapBtn">
    <input type="file" id="photo" accept="image/*" hidden />
    <span>Take or choose a photo</span>
  </label>

  <button type="button" class="add-manual" id="describeBtn">✍️ Describe a meal (AI estimates it)</button>
  <button type="button" class="add-manual" id="addManualBtn">✎ Add manually (from a label)</button>

  <!-- staging step: review photo, add an optional note, then confirm -->
  <section class="card stage hidden" id="stage">
    <img id="stagePreview" class="stage-img" alt="your meal" />
    <input type="text" id="note" class="note-input"
           placeholder="Optional: add context, e.g. 'chicken & mayo inside the wrap'" />
    <div class="stage-actions">
      <button type="button" id="cancelBtn" class="btn-secondary">Retake</button>
      <button type="button" id="confirmBtn" class="btn-primary">Confirm &amp; analyze</button>
    </div>
  </section>

  <section class="card result hidden" id="result">
    <img id="preview" alt="meal" />
    <div class="result-body">
      <div class="status" id="status">Analyzing…</div>
      <div class="result-fields hidden" id="fields">
        <h3 id="r-desc"></h3>
        <div class="cal"><span id="r-cal">0</span> kcal</div>
        <div class="macros">
          <span>Protein <b id="r-p">0</b>g</span>
          <span>Carbs <b id="r-c">0</b>g</span>
          <span>Fat <b id="r-f">0</b>g</span>
        </div>
        <small class="hint">Saved automatically with a timestamp.</small>
      </div>
    </div>
  </section>

  <section>
    <h2 class="hist-title">Trends</h2>
    <div class="card trends" id="trends">
      <div class="trend-top">
        <div class="trend-avg">
          <span id="tr-avg">0</span><small>avg kcal / day</small>
          <div class="trend-sub">last 7 days (excl. today)</div>
        </div>
        <div class="trend-chip" id="tr-chip"></div>
      </div>
      <div class="chart" id="tr-chart"></div>
      <div class="chart-legend" id="tr-legend"></div>
      <div class="trend-foot" id="tr-foot"></div>
      <div class="trend-burn" id="tr-burn"></div>
      <div class="goal-row">
        <label for="goal-input">Daily goal</label>
        <input id="goal-input" type="number" inputmode="numeric" placeholder="e.g. 2000" />
        <span>kcal</span>
      </div>
    </div>
  </section>

  <section>
    <h2 class="hist-title">History</h2>
    <div id="history"></div>
  </section>

  <!-- edit / manual / re-analyse modal -->
  <div class="modal hidden" id="editModal">
    <div class="modal-card">
      <h3 id="em-title">Edit meal</h3>
      <input id="em-desc-in" class="note-input" placeholder="Description (e.g. Granola bar)" />
      <div class="em-grid">
        <label>kcal<input id="em-cal" type="number" inputmode="numeric" /></label>
        <label>Protein g<input id="em-p" type="number" inputmode="decimal" /></label>
        <label>Carbs g<input id="em-c" type="number" inputmode="decimal" /></label>
        <label>Fat g<input id="em-f" type="number" inputmode="decimal" /></label>
      </div>
      <label class="em-label" for="em-when">When</label>
      <input id="em-when" class="note-input" type="datetime-local" />
      <label class="em-label" for="em-note" id="em-note-label">Comment (lets the AI re-estimate)</label>
      <textarea id="em-note" class="note-input"
                placeholder="e.g. 'larger portion, cooked in butter, with dressing'"></textarea>
      <div class="em-status" id="em-status"></div>
      <div class="em-actions">
        <button type="button" id="em-cancel" class="btn-secondary">Close</button>
        <button type="button" id="em-reanalyse" class="btn-secondary">Re-analyse</button>
        <button type="button" id="em-save" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
